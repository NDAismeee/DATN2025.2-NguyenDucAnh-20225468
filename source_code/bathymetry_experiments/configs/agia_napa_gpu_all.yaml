data:
  image_dir: ${IMAGE_DIR}
  depth_dir: ${DEPTH_DIR}
  image_glob: img_*.tif
  reflectance_scale: 255.0
  val_ratio: 0.2
train:
  seed: 42
  device: cuda
  epochs: 50
  batch_size: 2
  learning_rate: 0.001
  pixels_per_image: 2500
  image_size: 128
  limit_images: 0
logging:
  base_dir: runs_agia_napa_gpu_all
