data:
  train_image_dir: /mnt/disk3/anhnd2468/MagicBathyNet/puck_lagoon/img/aerial_train
  depth_dir: /mnt/disk3/anhnd2468/MagicBathyNet/puck_lagoon/depth/aerial
  pairing: magic
  image_suffix: "*.tif"
  depth_suffixes_to_try: ["_depth", "_bathy", "_gt", "_label"]
  image_mode: rgb
  reflectance_scale: 255.0
  magic_negative_depth_valid: true

train:
  seed: 42
  device: cuda
  gpu_id: 0
  val_infer_device: cuda
  batch_size: 8192
  epochs: 120
  weight_decay: 0.0001
  val_ratio: 0.2
  pixels_per_image: 5000
  include_xy: true
  max_train_pixels: 200000

model:
  hidden_layer_sizes: [256, 128, 64]
  activation: relu
  alpha: 0.0001
  learning_rate_init: 0.001
  max_iter: 200
  early_stopping: true

logging:
  save_dir: checkpoints_mlp_puck_lagoon_aerial_train
  model_name: mlp.joblib

infer:
  device: cuda
  checkpoint: checkpoints_mlp_puck_lagoon_aerial_train/mlp.joblib
  output_dir: mlp_infer_outputs
