data:
  image_dir: ${IMAGE_DIR}
  depth_dir: ${DEPTH_DIR}
  pairing: magic
  image_suffix: "img_379.tif"
  depth_suffixes_to_try: ["_depth", "_bathy", "_gt", "_label"]
  image_mode: rgb
  reflectance_scale: 255.0
  magic_negative_depth_valid: true

infer:
  checkpoint: depth_anything_v2_vitl.pth
  encoder: vitl
  output_dir: depth_anythingv2_infer_outputs_img379
  device: cuda
  gpu_id: 0
  input_size: 518
  normalize_depth: false
  depth_mean: null
  depth_std: null
