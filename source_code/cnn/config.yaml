data:
  image_dir: ${IMAGE_DIR}
  depth_dir: ${DEPTH_DIR}
  pairing: magic
  image_suffix: "img_*.tif"
  depth_suffixes_to_try: ["_depth", "_bathy", "_gt", "_label"]
  image_mode: rgb
  reflectance_scale: 255.0
  magic_negative_depth_valid: true

train:
  device: cuda
  gpu_id: 0
  seed: 42
  batch_size: 2
  num_workers: 0
  epochs: 30
  learning_rate: 0.0001
  weight_decay: 0.0001
  val_ratio: 0.2
  patience: 25
  normalize: true
  normalize_depth: true
  depth_min: null
  depth_max: null
  invalid_depth_values: []

model:
  hidden_channels: [32, 64, 64, 32]
  use_batchnorm: false
  dropout: 0.05
  use_coordconv: true
  norm_type: group
  num_groups: 8

logging:
  save_dir: checkpoints_cnn_depth
  best_model_name: best_model.pt
  last_model_name: last_model.pt
