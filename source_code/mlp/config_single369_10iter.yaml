data:
  image_dir: ${IMAGE_DIR}
  depth_dir: ${DEPTH_DIR}
  pairing: magic
  image_suffix: "img_369.tif"
  depth_suffixes_to_try: ["_depth", "_bathy", "_gt", "_label"]
  image_mode: rgb
  reflectance_scale: 255.0
  magic_negative_depth_valid: true

train:
  seed: 42
  val_ratio: 0.2
  pixels_per_image: 5000
  include_xy: true
  max_train_pixels: 200000

model:
  hidden_layer_sizes: [128, 64]
  activation: relu
  alpha: 0.0001
  learning_rate_init: 0.001
  max_iter: 10
  early_stopping: true

logging:
  save_dir: checkpoints_mlp_single369_10iter
  model_name: mlp.joblib
